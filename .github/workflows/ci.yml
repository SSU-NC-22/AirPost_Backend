name: CI

on:
  push:
  pull_request:

jobs:
  go:
    name: Go (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - application
          - logic-core
          - health-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: go build
        working-directory: ${{ matrix.service }}
        run: go build ./...

      - name: go vet
        working-directory: ${{ matrix.service }}
        run: go vet ./...

      - name: go test
        working-directory: ${{ matrix.service }}
        run: go test ./...
